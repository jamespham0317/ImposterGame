<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>WS Tester</title>
</head>
<body>

<h3>Connection</h3>
<input id="url" value="ws://localhost:5173" size="30">
<button onclick="toggleConnect()">Connect</button>
<span id="status">disconnected</span>
<br><br>
<label>Player ID: <input id="playerId" value="player1"></label>
<br><br>
<button onclick="send({type:'create-room', playerId:pid()})">create-room</button>

<h3>Room</h3>
<label>Room ID: <input id="roomId" placeholder="auto-filled or type here" size="20"></label>
<br><br>
<button onclick="send({type:'join-room', roomId:rid(), playerId:pid()})">join-room</button>
<button onclick="send({type:'leave-room', roomId:rid(), playerId:pid()})">leave-room</button>

<h3>Config</h3>
Difficulty:
<label><input type="checkbox" class="diff" value="easy" checked> easy</label>
<label><input type="checkbox" class="diff" value="medium" checked> medium</label>
<label><input type="checkbox" class="diff" value="hard" checked> hard</label>
<br><br>
<label>Master timer (s): <input id="masterTimer" type="number" value="300" size="6"></label>
<br><br>
<button onclick="sendConfig()">update-config</button>

<h3>Game</h3>
<button onclick="send({type:'start-game', roomId:rid()})">start-game</button>
<button onclick="send({type:'player-ready', roomId:rid(), playerId:pid()})">player-ready</button>
<br><br>

<h4>Last problem received</h4>
<table border="1" cellpadding="4" id="problem-table">
  <tr><td>title</td><td id="p-title">—</td></tr>
  <tr><td>difficulty</td><td id="p-difficulty">—</td></tr>
  <tr><td>topics</td><td id="p-topics">—</td></tr>
  <tr><td>description</td><td id="p-description" style="max-width:400px;white-space:pre-wrap">—</td></tr>
</table>
<br>

<label>Message: <input id="chatMsg" size="30"></label>
<button onclick="sendChat()">send-message</button>
<br><br>
<label>Code: <input id="code" value="def solution(): pass" size="40"></label>
<br><br>
<button onclick="send({type:'run-test-cycle', roomId:rid(), playerId:pid(), code:getCode()})">run-test-cycle</button>
<button onclick="send({type:'next-turn', roomId:rid(), playerId:pid(), code:getCode()})">next-turn</button>
<button onclick="send({type:'cast-vote', roomId:rid(), playerId:pid()})">cast-vote</button>

<h3>Raw JSON</h3>
<textarea id="rawJson" rows="3" cols="60" placeholder='{"type":"update-config","roomId":"abc"}'></textarea>
<br>
<button onclick="sendRaw()">send raw</button>

<h3>Log</h3>
<button onclick="document.getElementById('log').value=''">clear</button>
<br>
<textarea id="log" rows="20" cols="80" readonly></textarea>



<script>
  let ws = null;

  const pid     = () => document.getElementById('playerId').value.trim();
  const rid     = () => document.getElementById('roomId').value.trim();
  const getCode = () => document.getElementById('code').value.trim();

  function log(text) {
    const el = document.getElementById('log');
    const ts = new Date().toLocaleTimeString();
    el.value += `[${ts}] ${text}\n`;
    el.scrollTop = el.scrollHeight;
    console.log(text);
  }

  function send(obj) {
    if (!ws || ws.readyState !== 1) { log('ERROR: not connected'); return; }
    const msg = JSON.stringify(obj);
    log('SENT: ' + msg);
    ws.send(msg);
  }

  function sendRaw() {
    const raw = document.getElementById('rawJson').value.trim();
    if (!raw) return;
    try { JSON.parse(raw); } catch(e) { log('ERROR: invalid JSON - ' + e.message); return; }
    if (!ws || ws.readyState !== 1) { log('ERROR: not connected'); return; }
    log('SENT RAW: ' + raw);
    ws.send(raw);
  }

  function toggleConnect() {
    if (ws && ws.readyState === 1) { ws.close(); return; }
    const url = document.getElementById('url').value.trim();
    ws = new WebSocket(url);
    ws.onopen = () => {
      document.getElementById('status').textContent = 'connected';
      log('connected to ' + url);
    };
    ws.onmessage = (e) => {
      log('RECV: ' + e.data);
      try {
        const d = JSON.parse(e.data);
        if (d.roomId) {
          document.getElementById('roomId').value = d.roomId;
        }
        if (d.type === 'game-started' && d.problem) {
          const p = d.problem;
          document.getElementById('p-title').textContent = p.title || '—';
          document.getElementById('p-difficulty').textContent = p.difficulty || '—';
          document.getElementById('p-topics').textContent = (p.topics || []).join(', ') || '—';
          document.getElementById('p-description').textContent = p.description || '—';
        }
      } catch(_) {}
    };
    ws.onerror = (e) => log('ERROR: websocket error');
    ws.onclose = () => {
      document.getElementById('status').textContent = 'disconnected';
      log('disconnected');
      ws = null;
    };
  }

  function sendConfig() {
    const levels = [...document.querySelectorAll('.diff:checked')].map(c => c.value);
    send({
      type: 'update-config',
      roomId: rid(),
      difficultyRange: levels,
      masterTimer: parseInt(document.getElementById('masterTimer').value)
    });
  }

  function sendChat() {
    const msg = document.getElementById('chatMsg').value.trim();
    if (!msg) return;
    send({ type: 'send-message', roomId: rid(), playerId: pid(), message: msg, timestamp: Date.now() / 1000 });
    document.getElementById('chatMsg').value = '';
  }
</script>
</body>
</html>
